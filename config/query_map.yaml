version: 7
description: Run-ready source-friendly query map with source-optimized live phrasing for Reddit, Stack
  Overflow, and GitHub discussions/issues.
design_notes:
  purpose: Collect raw discussions from marketers, PMs, ops, non-technical analysts, and business users
    who hit dashboard trust, export, metric definition, and breakdown limits.
  key_principles:
  - Community raw phrasing beats research-language abstractions.
  - Pain phrases are more valuable than broad BI head terms.
  - Stack Overflow uses how-to, workflow, comparison, and validation phrasing.
  - GitHub uses need, missing, support, limitation, and complaint phrasing.
  priority_axes:
  - dashboard after export to excel or spreadsheet
  - metric definition confusion or mismatch
  - date basis or date field mismatch
  - segment breakdown after KPI change
  - need to explain KPI changes to stakeholders
  excluded_topics:
  - dashboard design
  - data viz best practices
  - sql optimization
  - ml analytics
  - warehouse architecture
  - machine learning
  - forecasting
  - visualization gallery
