version: 1
description: Query banks for non-developer BI and analytics pain-point discovery.
negative_downweight_lexicon:
  - SDK
  - API auth
  - OAuth
  - npm
  - stack trace
  - docker
  - kubernetes
  - CI/CD
  - plugin development
  - extension API
  - javascript error
  - python package install
  - dependency conflict
  - build failure
query_banks:
  numbers_mismatch:
    - numbers do not match
    - wrong totals
    - report discrepancy
    - dashboard says one thing export says another
    - which number should I trust
  metric_definition_confusion:
    - unclear metric definition
    - what is counted in this metric
    - KPI definition confusion
    - formula does not match business logic
  trend_interpretation_confusion:
    - why did this change
    - what caused this spike
    - what caused this drop
    - trend makes no sense
  segmentation_breakdown_confusion:
    - which breakdown should I look at
    - breakdown by channel device product
    - segment comparison does not add up
    - which segment caused the change
  dashboard_confusion:
    - dashboard is confusing
    - dashboard not enough
    - report makes no sense
    - chart says one thing table says another
  aggregation_filter_issue:
    - wrong aggregation
    - wrong date field
    - double counted
    - filter changes totals unexpectedly
  source_of_truth_conflict:
    - source of truth
    - crm says one thing analytics says another
    - backend does not match dashboard
    - finance does not match report
  stakeholder_explanation_pressure:
    - how do I explain this to my boss
    - leadership asked why the KPI changed
    - need to explain the numbers
    - weekly report pressure
  insight_to_action_failure:
    - what should I do based on these numbers
    - which metric matters
    - what action should I take
    - not sure what to optimize
  attribution_tracking_issue:
    - attribution mismatch
    - tracking issue
    - platform says one thing analytics says another
    - conversion path unclear
  funnel_conversion_drop:
    - conversion drop
    - revenue down
    - checkout drop
    - funnel drop off
  reporting_pain:
    - dashboard numbers wrong
    - monthly reporting takes too long
    - manual reporting in excel
    - report for leadership
    - board deck reporting
  dashboard_trust:
    - don't trust dashboard
    - business users stopped using dashboard
    - reconcile dashboard with source data
    - numbers look wrong
  manual_excel_work:
    - export to excel every week
    - spreadsheet-heavy reporting
    - Power BI export to excel workflow
    - Tableau manual reporting
  ad_hoc_analysis:
    - ad hoc request from stakeholders
    - why did conversion drop
    - break down by segment channel device
    - can't explain KPI change
  metric_inconsistency:
    - metric inconsistency
    - dashboard numbers wrong
    - reconcile dashboard with source data
    - numbers look wrong
  root_cause:
    - root cause analysis difficulty
    - why did conversion drop
    - can't explain KPI change
  segmentation_confusion:
    - break down by segment channel device
    - segmentation breakdown confusion
    - compare by segment
