clustering:
  min_primary_score: 0.8
  secondary_score_floor: 0.9
  secondary_ratio_floor: 0.55
  min_anchor_size: 24
  min_anchor_share: 0.025
  max_anchor_count: 10
  merge_similarity_threshold: 0.84
  merge_signature_floor: 0.74
  require_shared_secondary_for_primary_merge: true
  max_context_features: 3
  max_examples_per_cluster: 6

robustness:
  min_stable_cluster_size: 24
  min_stable_cluster_share: 0.08
  micro_cluster_size: 8
  same_primary_absorb_similarity: 0.8
  same_base_name_absorb_similarity: 0.72
  same_name_absorb_similarity: 0.78
  general_absorb_similarity: 0.9
  low_separation_absorb_similarity: 0.9
  low_separation_ceiling: 0.1
  low_separation_max_share: 0.45
  residual_bucket_by_primary: true
  residual_bucket_max_count: 4
  residual_fragile_cluster_size: 14
  sufficient_separation_floor: 0.12
  sufficient_cohesion_floor: 0.9
  merge_broadened_separation_floor: 0.2
  merge_broadened_cohesion_floor: 0.8
  merge_broadened_min_anchor_count: 3

persona_overlap_merge:
  enabled: true
  min_parent_cluster_size: 24
  compatible_profile_score_floor: 4
  similarity_floor: 0.50
  max_role_share_gap: 0.35
  merge_role_families:
    - analyst_operator
    - workflow_operator
  compatible_trust_families:
    - visible_but_not_explainable
    - delivery_or_explanation_breakdown
  compatible_workaround_families:
    - dashboard_workaround_patch
    - out_of_tool_workaround
    - manual_patch_and_rebuild

promotion_scoring:
  enabled: true
  promote_score_min: 0.72
  candidate_score_min: 0.58
  minimum_actionability_score: 0.55
  minimum_distinctiveness_score: 0.18
  minimum_output_consistency_score: 0.55
  minimum_cross_source_robustness_score: 0.35
  redundancy_similarity_ceiling: 0.85
  weights:
    structural_stability: 0.26
    grounding_quality: 0.22
    distinctiveness: 0.18
    actionability: 0.18
    output_consistency: 0.08
    cross_source_robustness: 0.08

