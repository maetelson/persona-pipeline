  - "^what to measure in your first"
  - "^year-end reporting"
  - "^agentic shopping"
  - "community guidelines"
  - "store feedback$"
discovery_exclude_url_patterns:
  - "/t/about-the-.*-category/"
aliases:
  - shopify
  - shopify community
discovery_urls:
  - url: https://community.shopify.com/c/data-analytics/293
    board: Data and Analytics
  - url: https://community.shopify.com/c/shopify-discussion/95
    board: Shopify Discussion
  - url: https://community.shopify.com/c/email-marketing/292
    board: Email Marketing
  - url: https://community.shopify.com/c/store-feedback/125
    board: Store Feedback
rss_discovery_urls:
  - url: https://community.shopify.com/c/data-analytics/293.rss
    board: Data and Analytics
  - url: https://community.shopify.com/posts.rss
    board: Recent Posts
