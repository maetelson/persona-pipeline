source_id: shopify_community
source_name: Shopify Community
source_group: business_communities
collector_kind: business_communities
normalizer_kind: business_communities
enabled: true
platform: shopify
product_or_tool: Shopify
check_robots: false
query_mode: source_config
seed_bank_path: config/seeds/business_communities/shopify_community.yaml
discovery_page_count: 80
discovery_sleep_seconds: 0.15
sleep_seconds: 0.05
fetch_retry_base_seconds: 5
fetch_retry_max_seconds: 25
rate_limit_retry_base_seconds: 20
rate_limit_retry_max_seconds: 90
filter_discovery_by_seed: true
include_candidate_seed_pool_for_discovery: true
min_seed_term_matches: 1
seed_source_token: shopify
seed_query_style: support_community
stop_on_http_404_for_discovery: true
max_consecutive_empty_discovery_pages: 2
max_consecutive_duplicate_only_pages: 3
max_consecutive_seed_filtered_only_pages: 3
stop_on_http_404_for_sitemap_index: true
max_consecutive_zero_accept_sitemaps: 5
max_consecutive_duplicate_only_sitemaps: 3
max_consecutive_seed_filtered_only_sitemaps: 5
discovery_exclude_title_patterns:
