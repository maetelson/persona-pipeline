source_id: shopify_community
source_name: Shopify Community
source_group: business_communities
collector_kind: business_communities
normalizer_kind: business_communities
enabled: true
platform: shopify
product_or_tool: Shopify
check_robots: false
query_mode: source_config
seed_bank_path: config/seeds/business_communities/shopify_community.yaml
max_query_count: 20
max_threads_per_run: 1400
max_discovered_threads_per_url: 150
discovery_page_count: 25
sleep_seconds: 0.15
filter_discovery_by_seed: false
include_candidate_seed_pool_for_discovery: false
seed_source_token: shopify
seed_query_style: support_community
discovery_exclude_title_patterns:
