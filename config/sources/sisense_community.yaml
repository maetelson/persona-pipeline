source_id: sisense_community
source_name: Sisense Community
source_group: business_communities
collector_kind: business_communities
normalizer_kind: business_communities
enabled: true
min_raw_records_warn: 0
platform: sisense
product_or_tool: Sisense
check_robots: true
query_mode: source_config
seed_bank_path: config/seeds/business_communities/sisense_community.yaml
seed_source_token: sisense
seed_query_style: support_community
discovery_page_count: 20
sleep_seconds: 0.05
filter_discovery_by_seed: false
include_candidate_seed_pool_for_discovery: false
min_seed_term_matches: 1
aliases:
  - sisense
  - sisense community
discovery_urls:
  - url: https://community.sisense.com/
    board: Sisense Community
  - url: https://community.sisense.com/t5/Help-and-How-To/bg-p/help_and_how_to
    board: Help and How-To
  - url: https://community.sisense.com/t5/Troubleshooting/bg-p/troubleshooting
    board: Troubleshooting
discovery_exclude_url_patterns:
  - /events
  - /blogs
  - /kb
  - /groups
sitemap_discovery_urls:
  - url: https://community.sisense.com/sitemap_help_and_how_to.xml.gz
    board: Help and How-To
  - url: https://community.sisense.com/sitemap_troubleshooting.xml.gz
    board: Troubleshooting
sitemap_index_urls:
  - url: https://community.sisense.com/sitemap.xml
    board: Sisense Community
sitemap_index_include_patterns:
  - sitemap_help_and_how_to
  - sitemap_troubleshooting
  - sitemap_data_sources
  - sitemap_embedding_analytics
  - sitemap_widget_and_dashboard_scripts
  - sitemap_data_models
  - sitemap_sisense_intelligence
  - sitemap_sisense_administration
  - sitemap_cloud_managed_service
  - sitemap_add-ons_and_plug-ins
  - sitemap_blox
sitemap_index_exclude_patterns:
  - sitemap_blog_
  - sitemap_ideas
  - sitemap_use-case-gallery
  - sitemap_live-
  - sitemap_on-demand-events
  - sitemap_community_guidelines
  - sitemap_faqs
  - sitemap_nodes
  - sitemap_casual-conversations
  - sitemap_onboarding
  - sitemap_apis
