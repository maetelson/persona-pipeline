source_id: hubspot_community
source_name: HubSpot Community
source_group: business_communities
collector_kind: business_communities
normalizer_kind: business_communities
enabled: true
platform: hubspot
product_or_tool: HubSpot
check_robots: true
query_mode: source_config
seed_bank_path: config/seeds/business_communities/hubspot_community.yaml
seed_source_token: hubspot
seed_query_style: support_community
max_query_count: 100
max_threads_per_run: 10000
max_discovered_threads_per_url: 1000
discovery_page_count: 100
sleep_seconds: 0.15
filter_discovery_by_seed: true
include_candidate_seed_pool_for_discovery: false
api_discovery:
