query_seed_taxonomy:
  design_notes:
    purpose: Keep a reviewable keyword bank for broad quantitative interpretation pain across operator communities.
    rule_of_thumb:
    - Broad BI terms alone are too noisy for first-pass collection.
    - Prefer mismatch, trust, interpretation, breakdown, explanation, and actionability language over generic BI nouns.
    - Use community-style wording over research-language abstractions.
  canonical_problem_axes:
    - numbers_mismatch
    - metric_definition_confusion
    - trend_interpretation_confusion
    - segmentation_breakdown_confusion
    - dashboard_confusion
    - aggregation_filter_issue
    - source_of_truth_conflict
    - business_question_translation_failure
    - stakeholder_explanation_pressure
    - insight_to_action_failure
    - attribution_tracking_issue
    - funnel_conversion_drop
  conversion_policy:
    principle: Conversion pain is one branch under broad quantitative pain, not the primary framing for the whole seed system.
    guidance:
      - Keep conversion and attribution seeds where they are community-native.
      - Do not use conversion-only wording as the style anchor for every source.
  community_profiles:
    reddit:
      language_style:
        - first person
        - confused
        - practical frustration
        - peer validation
      prioritize_axes:
        - numbers_mismatch
        - trend_interpretation_confusion
        - stakeholder_explanation_pressure
        - source_of_truth_conflict
        - business_question_translation_failure
    stackoverflow:
      language_style:
        - sql and aggregation logic
        - filters and date ranges
        - reconciliation
      prioritize_axes:
        - aggregation_filter_issue
        - numbers_mismatch
        - metric_definition_confusion
