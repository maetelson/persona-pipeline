bundle_name: github_discussions_lightdash_single_repo_pilot
source_family: existing_github_discussions_collector
pilot_only: true
target_repos:
  - lightdash/lightdash
thread_limit_per_repo: 150
max_listing_pages_per_repo: 12
comment_cap: 10
request_delay_seconds: 0.75
timeout_seconds: 20
fetch_method: public_html
pilot_output_dir: artifacts/source_pilots
pilot_output_files:
  raw_jsonl: github_discussions_lightdash_raw.jsonl
  sample_csv: github_discussions_lightdash_sample.csv
  summary_json: github_discussions_lightdash_summary.json
inclusion_terms:
  - dashboard
  - dashboards
  - reporting
  - report
  - metric
  - metrics
  - source of truth
  - drill down
  - drilldown
  - stakeholder
  - export
  - spreadsheet
  - reconciliation
  - mismatch
  - semantic layer
  - model confusion
  - root cause
  - explain numbers
exclusion_terms:
  - install
  - deployment
  - auth
  - authentication
  - permission
  - ci/cd
  - infrastructure
  - tutorial
  - beginner
  - release
  - announcement
  - api
  - sdk
  - library
  - bug in my code
