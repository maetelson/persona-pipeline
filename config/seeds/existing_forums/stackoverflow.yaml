source_id: stackoverflow
source_group: existing_forums
max_query_count: 60
source_notes: "Stack Overflow pain-family search targets BI validation, reconciliation, and report-integrity questions while avoiding generic programming help."
pain_families:
  - family_id: reconciliation_mismatch
    priority: high
    expected_signal_type: metric_definition_conflict
    query_terms: [wrong total, not matching]
    title_terms: [dashboard total, sql result, report total, summary detail]
    body_terms: [not matching, left join duplicates, rows do not add up, reconcile]
    nottagged: [reactjs, javascript, css, html, docker, oauth-2.0, selenium, web-scraping]
  - family_id: metric_definition_conflict
    priority: high
    expected_signal_type: metric_definition_conflict
    query_terms: [date filter total, calculated field]
    title_terms: [metric definition, created_at, event_date, business definition]
    body_terms: [wrong total, date basis, calculated field, reporting]
    nottagged: [reactjs, javascript, css, html, docker, oauth-2.0, selenium, web-scraping]
  - family_id: export_report_integrity
    priority: high
    expected_signal_type: export_revalidation
    query_terms: [export csv, rows total]
    title_terms: [report export, rows total, table rows, csv export]
    body_terms: [not matching, report integrity, formatted report, dashboard export]
    nottagged: [reactjs, javascript, css, html, docker, oauth-2.0, selenium, web-scraping]
  - family_id: segmentation_breakdown_confusion
    priority: high
    expected_signal_type: segment_breakdown
    query_terms: [distinct count, group by wrong]
    title_terms: [channel totals, breakdown, device breakdown, group by]
    body_terms: [does not add up, filter total, segment totals, report]
    nottagged: [reactjs, javascript, css, html, docker, oauth-2.0, selenium, web-scraping]
  - family_id: attribution_source_of_truth
    priority: medium
    expected_signal_type: attribution_tracking_issue
    query_terms: [source of truth, dashboard mismatch]
    title_terms: [platform mismatch, attribution mismatch, source of truth, event date]
    body_terms: [dashboard does not match, query does not match, report mismatch, not matching]
    nottagged: [reactjs, javascript, css, html, docker, oauth-2.0, selenium, web-scraping]
