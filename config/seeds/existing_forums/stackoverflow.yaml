legacy_sentence_seeds:
  - sql total higher after group by
  - count distinct returns wrong total
  - left join duplicates rows in report
  - event_date and created_at counts differ
  - calculated field total does not match rows
  - date filter changes totals unexpectedly
  - sql result does not match dashboard total
  - channel totals do not add up in report
  - report total does not match table rows
  - metric logic does not match business definition
