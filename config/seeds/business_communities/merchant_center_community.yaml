source_id: merchant_center_community
source_group: business_communities
max_query_count: 8
source_notes: "Merchant Center seeds prioritize product-level performance interpretation, affected-item diagnosis, metric trust, and product-group breakdown confusion rather than only feed setup."
candidate_seed_pool:
  - free listings performance changed
  - why are some products down and others not
  - which metric should I trust for product visibility
  - export says one thing dashboard says another
  - click trend by product category is confusing
active_core_seeds:
  # Canonical axes: trend_interpretation_confusion,
  # segmentation_breakdown_confusion, numbers_mismatch,
  # source_of_truth_conflict, dashboard_confusion.
  - seed: merchant center performance changed suddenly
    reason: Strong product-specific trend interpretation phrasing.
  - seed: shopping impressions dropped for some products
    reason: Captures affected-item diagnosis, not just topline decline.
  - seed: which products lost impressions
    reason: Narrows affected-item diagnosis to concrete visibility loss language used in Merchant Center posts.
  - seed: merchant center numbers don't match
    reason: Broad product-specific trust and mismatch wording.
  - seed: product diagnostics and performance don't line up
    reason: Better matches Merchant Center-native trust conflicts between diagnostics and performance tabs.
  - seed: product group clicks dropped
    reason: Native product-group diagnosis phrasing with clear performance interpretation intent.
  - seed: product visibility dropped after feed update
    reason: Adds feed-change interpretation pain without drifting into setup-only support.
  - seed: what changed in shopping performance
    reason: Broad but still high-intent explanatory phrasing.
  - seed: free listings performance changed
    reason: Adds a Merchant Center-native performance branch outside paid shopping only.
optional_templates:
  - template: merchant center price mismatch
    reason: Preserved from the older set, but downgraded because it focuses one narrow discrepancy family.
  - template: merchant center feed sync
    reason: Preserved for operational context, but downgraded because feed-sync setup noise can dominate results.
  - template: merchant center disapproved
    reason: Preserved as an adjacent operational issue, but downgraded because it is often policy/support rather than quantitative interpretation.
  - template: merchant center suspended
    reason: Preserved because it still matters operationally, but downgraded for the same reason as disapproval.
negative_terms:
  - api
  - script
  - crawler
  - developer
  - job
  - career
  - certification
  - phone support
legacy_seed_notes:
  - seed: merchant center approved
    action: removed_from_core
    why: too broad
    note: Approval-state wording alone does not strongly imply quantitative interpretation pain.
  - seed: merchant center local feed
    action: downgraded
    why: tutorial/setup noise
    note: Useful for operational support, but too setup-heavy to remain in the core set.
  - seed: dashboard not matching export
    action: removed_from_core
    why: community-language mismatch
    note: Too generic for Merchant Center, where operators speak more often in diagnostics, visibility, and affected-item language.
  - seed: which products are affected
    action: removed_from_core
    why: too broad
    note: Needed a concrete performance symptom to avoid pulling policy-only product threads.
