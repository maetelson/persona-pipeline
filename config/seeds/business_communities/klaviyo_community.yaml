source_id: klaviyo_community
source_group: business_communities
max_query_count: 10
source_notes: "Klaviyo seeds capture confusion about revenue interpretation, segment/report mismatch, trend reading, attribution trust, and what to optimize next."
candidate_seed_pool:
  - campaign and flow numbers tell different stories
  - attributed revenue vs Shopify revenue mismatch
  - hard to explain results to leadership
  - what changed after list growth slowed
  - hard to know what action to take next
  - signup rate is low but traffic is stable
  - forms not converting but traffic is there
  - benchmark numbers don't match expectations
  - revenue from flows not making sense
  - segment size changed unexpectedly
  - reporting results are delayed
active_core_seeds:
  # Canonical axes: numbers_mismatch, trend_interpretation_confusion,
  # segmentation_breakdown_confusion, metric_definition_confusion,
  # insight_to_action_failure, attribution_tracking_issue.
  - seed: klaviyo revenue doesn't match
    reason: Strong product-specific mismatch phrasing.
  - seed: attributed revenue vs Shopify revenue mismatch
    reason: Narrows attribution trust pain to a concrete cross-system conflict operators actually report.
  - seed: campaign results don't match report
    reason: Better grounds report-confusion language in Klaviyo-native campaign reporting.
  - seed: flow revenue dropped but opens are stable
    reason: Captures trend diagnosis with two competing metrics instead of generic change wording.
  - seed: segment numbers don't match
    reason: Captures segmentation and audience-definition confusion.
  - seed: which revenue metric should I trust
    reason: Strong metric-trust and source-of-truth signal.
  - seed: what changed in campaign performance
    reason: Broad but high-intent explanatory phrasing.
  - seed: dashboard not matching export
    reason: Explicit report-vs-export discrepancy.
  - seed: which segment should I look at
    reason: Adds breakdown-choice confusion.
  - seed: what should I optimize based on these numbers
    reason: Adds actionability pain beyond report trust.
optional_templates:
  - template: open rate drop
    reason: Preserved from the older logic, but downgraded because it is one narrow trend family rather than the center.
  - template: click rate changed
    reason: Preserved as a metric branch, but downgraded for the same reason.
  - template: klaviyo report wrong
    reason: Preserved because it still surfaces report trust pain, but downgraded due to overlap with stronger active seeds.
  - template: attribution not matching
    reason: Preserved to keep attribution coverage without over-centering it.
negative_terms:
  - api
  - script
  - developer
  - certification
  - job
  - career
  - agency hiring
  - phone support
legacy_seed_notes:
  - seed: campaign performance drop
    action: merged
    why: duplicate coverage
    note: Folded into `what changed in campaign performance` and `flow performance changed suddenly`.
  - seed: list growth dropped
    action: downgraded
    why: high unknown-ratio risk
    note: Useful in some cases, but too narrow and often ambiguous without stronger interpretation context.
  - seed: attributed revenue looks wrong
    action: removed_from_core
    why: vague topic word
    note: Too broad on its own and weaker than explicit cross-system mismatch language.
  - seed: campaign report makes no sense
    action: removed_from_core
    why: duplicate semantic coverage
    note: Replaced with a narrower report-vs-result mismatch phrasing that stays more operator-native.
