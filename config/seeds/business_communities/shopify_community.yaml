active_core_seeds:
  - seed: reached checkout rate
    reason: Adds funnel-stage coverage shown by collected Shopify conversion titles.
  - seed: wrong analytics data
    reason: Captures merchant complaints that Shopify analytics numbers are inaccurate.
  - seed: shopify reporting issue
    reason: Broad Shopify-native reporting phrase with distinct collected coverage.
  - seed: shopify analytics discrepancy
    reason: Scored highest against collected Shopify analytics titles and board language.
  - seed: sessions by product
    reason: Restores product/session breakdown coverage found in collected titles.
  - seed: analytics not working
    reason: Broadly captures merchant reports that store analytics are broken or unreliable.
  - seed: product conversion rate
    reason: Captures product-level performance analysis needs.
  - seed: sessions not tracking
    reason: Captures session-count tracking and traffic quality complaints.
  - seed: sales report wrong
    reason: Pulls concrete sales reporting pain.
  - seed: added to cart tracking
    reason: Restores cart-event tracking coverage for Shopify funnel analysis.
optional_templates:
  - template: days on hand report
    reason: Extra inventory reporting phrase from fetched titles.
  - template: product analysis report
    reason: Extra Shopify product analytics phrasing.
  - template: sales channel report
    reason: Extra channel reporting phrase.
  - template: shopify reporting issue
