source_id: google_ads_help_community
source_group: business_communities
max_query_count: 10
source_notes: "Google Ads Help seeds focus on performance diagnosis, trust in reported numbers, metric comparison, and interpretation of campaign changes. Setup-only conversion questions are intentionally de-emphasized."
candidate_seed_pool:
  - segment comparison shows different numbers
  - campaign report makes no sense
  - compare this week vs last week campaign performance
  - which campaign caused the change
  - report not matching actual sales
active_core_seeds:
  # Canonical axes: attribution_tracking_issue, numbers_mismatch,
  # trend_interpretation_confusion, segmentation_breakdown_confusion,
  # source_of_truth_conflict, funnel_conversion_drop.
  - seed: google ads numbers don't match
    reason: Broad but still high-intent product-specific trust phrasing.
  - seed: conversions not matching clicks
    reason: Strong discrepancy language that stays tied to interpretation, not setup.
  - seed: why did campaign performance change
    reason: Direct diagnosis phrasing for trend interpretation.
  - seed: which conversion number is correct
    reason: Strong source-of-truth language in help style.
  - seed: google ads report discrepancy
    reason: Product-specific reporting mismatch phrasing.
  - seed: GA4 and Google Ads numbers different
    reason: Cross-system trust conflict with strong operator value.
  - seed: ROAS dropped but traffic looks normal
    reason: More concrete diagnosis phrasing than a generic CPA-anomaly question.
  - seed: what caused this drop in conversions
    reason: Keeps conversion as one branch under broader diagnostic pain.
  - seed: device segment conversions don't match total
    reason: Keeps breakdown confusion but grounds it in Ads-native reporting language.
  - seed: which conversion action should I trust
    reason: Narrows metric-trust language to a real Google Ads operator decision.
optional_templates:
  - template: google ads conversion delay
    reason: Preserved from the older set, but downgraded because it can skew toward reporting-lag setup discussion.
  - template: clicks no conversions
    reason: Preserved because it still signals diagnostic pain, but downgraded to avoid over-centering conversion-only wording.
  - template: drop in impressions
    reason: Preserved as trend pain, but downgraded because it is weaker without interpretation context.
  - template: merchant center mismatch
    reason: Preserved because it still bridges shopping-report trust, but downgraded to keep this seed bank focused on Ads-native language.
negative_terms:
  - api
  - script
  - crawler
  - developer
  - certification
  - job
  - career
  - phone support
legacy_seed_notes:
  - seed: google ads conversions missing
    action: downgraded
    why: conversion-centric bias
    note: Kept as secondary coverage through templates rather than the center of the seed set.
  - seed: conversion tracking not working
    action: downgraded
    why: tutorial/setup noise
    note: More likely to pull implementation and setup questions than interpretation pain.
  - seed: segment comparison shows different numbers
    action: removed_from_core
    why: community-language mismatch
    note: Too abstract for Ads Help, where segment confusion is usually expressed through device, campaign, or conversion-action wording.
