source_id: amplitude_community
source_group: business_communities
max_query_count: 10
source_notes: "Amplitude Community seeds focus on event-property trust, funnel and retention interpretation, chart/report mismatch, and product-analytics breakdown confusion."
candidate_seed_pool:
  - amplitude chart makes no sense
  - which amplitude chart should I trust
  - what changed in this product trend
  - amplitude breakdown is confusing
  - how do I explain this drop
active_core_seeds:
  # Canonical axes: numbers_mismatch, metric_definition_confusion,
  # trend_interpretation_confusion, segmentation_breakdown_confusion,
  # source_of_truth_conflict, insight_to_action_failure.
  - seed: amplitude event count doesn't match chart
    reason: Strong event-versus-chart trust phrasing in product-analytics language.
  - seed: funnel conversion chart is different from conversion over time
    reason: Native Amplitude analysis mismatch phrasing tied to interpretation pain.
  - seed: retention analysis numbers don't make sense
    reason: Captures trend and metric-logic confusion without centering conversion only.
  - seed: breakdown by event property does not add up
    reason: Product-analytics segmentation confusion in community-native wording.
  - seed: which amplitude metric should I trust
    reason: Direct source-of-truth framing for analysis users.
  - seed: dashboard and csv export don't match
    reason: Preserves dashboard-versus-export trust conflict.
  - seed: what changed in this trend in amplitude
    reason: Broad trend interpretation pain in source-native language.
  - seed: session or event data looks wrong in amplitude
    reason: Covers event/session trust complaints beyond funnel loss.
  - seed: chart result does not match expected user count
    reason: Captures calculation and denominator confusion in Amplitude wording.
  - seed: what should I do based on this analysis
    reason: Adds insight-to-action failure without narrowing to marketing only.
optional_templates:
  - template: amplitude user property breakdown looks wrong
    reason: Useful property-level trust phrase, but optional due to overlap with broader breakdown seeds.
  - template: time to convert doesn't match funnel
    reason: Preserved as a strong chart-comparison branch, but downgraded to avoid funnel overconcentration.
  - template: amplitude chart and dashboard disagree
    reason: Preserved as an extra dashboard-trust variant.
negative_terms:
  - sdk
  - instrumentation setup
  - api
  - react native
  - ios sdk
  - android sdk
  - webhook
  - implementation only
  - certification
  - job
legacy_seed_notes:
  - seed: mixpanel event count doesn't match report
    action: removed
    why: community-language mismatch
    note: Replaced by Amplitude-native chart, funnel, retention, and property-breakdown phrasing.
